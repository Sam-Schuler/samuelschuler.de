# --- BASIS INFOS ---
# Diese Daten nutzt Jekyll für das Design und Suchmaschinen (SEO)
title: Samuel Schuler
description: Skulpturen aus Stein und Beton

# --- DESIGN ---
# Das Theme wird direkt von GitHub geladen
remote_theme: jekyll/minima

# --- THEME KONFIGURATION ---
minima:
  skin: light           # Helles Design (Alternativen: dark, solarized-light)
  show_rss: false       # Deaktiviert den RSS-Button im Footer (neue Versionen)
  
  # Social Media Verknüpfungen
  social_links:
    - platform: instagram
      user_url: https://www.instagram.com/samuelschuler.de

# --- ERWEITERUNGEN (PLUGINS) ---
# Hier definieren wir, was aktiv sein soll. 
# Wichtig: 'jekyll-feed' ist hier NICHT gelistet, um den Button zu unterdrücken.
plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag

# --- ZUSATZ-STEUERUNG ---
# Schaltet den Feed-Pfad komplett ab, falls das Plugin im Hintergrund läuft.
feed:
  path: false
